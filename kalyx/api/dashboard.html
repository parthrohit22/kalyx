<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KALYX API</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1318;
      --panel: #171d23;
      --line: #2a343d;
      --text: #edf2f6;
      --muted: #a5b0ba;
      --green: #37c98f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      width: min(680px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    code {
      color: var(--green);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>KALYX API is running</h1>
    <p>
      The operations console is now a separate Angular frontend.
      Start it with <code>cd frontend && npm install && npm start</code>.
    </p>
    <p>
      FastAPI remains the backend authority for ingestion, ledger writes,
      verification, detection, and alert persistence.
    </p>
  </main>
</body>
</html>
